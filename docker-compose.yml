version: "3.9"

services:
  # ── FastAPI inference backend ──────────────────────────────────
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints:ro   # mount checkpoint read-only
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    environment:
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Streamlit UI ───────────────────────────────────────────────
  app:
    build:
      context: .
      target: streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
